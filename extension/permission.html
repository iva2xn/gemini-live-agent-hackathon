<!DOCTYPE html>
<html>

<head>
    <title>Microphone Setup</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background: #f9f9f9;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Microphone Access Required 🎤</h2>
        <p>Please click <b>"Allow"</b> in the Chrome popup above so Autopilot can hear you.</p>
        <p id="message" style="font-weight: bold;"></p>
    </div>
    <script src="permission.js"></script>
</body>

</html>
