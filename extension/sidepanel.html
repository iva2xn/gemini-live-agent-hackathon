<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>NIBO Autopilot</title>
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #ffffff;
            --foreground: #020817;
            --card: #ffffff;
            --card-foreground: #020817;
            --primary: #0052ff;
            --primary-foreground: #ffffff;
            --secondary: #f1f5f9;
            --secondary-foreground: #020817;
            --muted: #f1f5f9;
            --muted-foreground: #64748b;
            --border: #e2e8f0;
            --radius: 0.75rem;
            
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --shadow-sm: 0px 2px 4px 0px hsl(0 0% 0% / 0.05);
            --shadow: 0px 4px 6px -1px hsl(0 0% 0% / 0.1), 0px 2px 4px -2px hsl(0 0% 0% / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--background);
            color: var(--foreground);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ════════════════════════════════════════ */
        /* HEADER SECTION                          */
        /* ════════════════════════════════════════ */
        header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--background);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--foreground);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
            transition: all 0.3s ease;
        }

        .status-dot.active {
            background: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        /* ════════════════════════════════════════ */
        /* MAIN CONTENT                            */
        /* ════════════════════════════════════════ */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #fafafa;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted-foreground);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            padding-left: 4px;
        }


        /* ════════════════════════════════════════ */
        /* FOOTER / CONTROLS                       */
        /* ════════════════════════════════════════ */
        footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: var(--background);
            display: flex;
            gap: 12px;
        }

        .btn {
            height: 48px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--primary-foreground);
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            width: 48px;
            background: var(--secondary);
            color: var(--foreground);
            flex-shrink: 0;
        }

        .btn-secondary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Mode Toggle Styles */
        .mode-toggle {
            display: flex;
            background: var(--secondary);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted-foreground);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .mode-btn svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-left">
            <h1>NIBO</h1>
            <div id="statusIcon" class="status-dot"></div>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div id="recordingLabel" style="font-size: 12px; font-weight: 600; color: #ef4444; display: none;">REC</div>
            <button id="settingsBtn" style="background: none; border: none; cursor: pointer; color: var(--muted-foreground); display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 6px; transition: all 0.2s;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <div id="settingsView" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 20; padding: 20px;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 24px;">
                <button id="backBtn" style="background: none; border: none; cursor: pointer; color: var(--foreground); padding: 4px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h2 style="font-size: 18px; font-weight: 700;">Settings</h2>
            </div>

            <div class="section-title">Keybinds</div>
            <div style="background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; padding: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 14px; font-weight: 500; color: #475569;">Toggle & Record</span>
                    <kbd style="background: white; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-family: monospace; font-weight: 700; color: var(--primary); font-size: 14px; box-shadow: 0 2px 0 var(--border);"> / </kbd>
                </div>
                <p style="font-size: 12px; color: var(--muted-foreground); margin-top: 8px;">Press this key anywhere to open NIBO and start listening.</p>
            </div>
            </div>
        </div>

        <!-- Mode Toggle Section -->
        <div class="mode-toggle">
            <button id="talkModeBtn" class="mode-btn active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Talk Mode
            </button>
            <button id="shieldModeBtn" class="mode-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Shield Mode
            </button>
        </div>

        <div id="loadingState" style="text-align: center; margin-top: 60px; color: var(--muted-foreground);">
            <div style="font-size: 40px; opacity: 0.3; margin-bottom: 12px;">🛡️</div>
            <p style="font-size: 14px; font-weight: 500;">Live Risk Detection Active</p>
            <p style="font-size: 13px; margin-top: 6px; opacity: 0.8;">Navigating to a new page will automatically trigger a safety scan.</p>
        </div>

        <div id="riskSection" style="margin-top: 8px; display: none; transition: all 0.3s ease;">
            <div style="font-size: 11px; font-weight: 700; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; padding-left: 4px;">Live Risk Detection</div>
            <div id="riskUrl" style="font-weight: 700; font-size: 18px; margin-bottom: 16px; word-break: break-all; color: var(--foreground); line-height: 1.3; padding: 0 4px;"></div>
            
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 14px; background: #f8fafc; border-radius: 12px; border: 1px solid var(--border);">
                <div id="riskScoreBadge" style="padding: 8px 14px; border-radius: 8px; font-weight: 700; font-size: 18px; color: #fff; text-align: center; min-width: 50px; display: flex; align-items: center; justify-content: center;"></div>
                <div id="riskLevel" style="font-size: 16px; font-weight: 700;"></div>
            </div>
            
            <div id="riskReasoning" style="font-size: 14px; color: #475569; line-height: 1.6; padding: 0 8px;"></div>
        </div>
    </main>

    <footer>
        <button id="startBtn" class="btn btn-primary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
            <span id="btnText">Listen to Record</span>
        </button>
        <button id="stopBtn" class="btn btn-secondary" disabled title="Stop Recording">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h12v12H6z"/>
            </svg>
        </button>
    </footer>

    <script src="sidepanel.js"></script>
</body>

</html>
